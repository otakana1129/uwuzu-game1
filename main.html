<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン付きゲーム</title>

<style>
    body{
        margin: 0;
        font-family: Arial, sans-serif;
        background: #222;
        color: white;
    }

    /* ログイン画面 */
    #loginContainer{
        position: fixed;
        width: 100%;
        height: 100vh;
        background: rgba(0,0,0,0.9);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .box{
        background: #333;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
        text-align: center;
    }

    input{
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 5px;
    }

    button{
        padding: 10px 20px;
        margin-top: 10px;
        border: none;
        border-radius: 5px;
        background: #4CAF50;
        color: white;
        cursor: pointer;
    }

    button:hover{
        background: #45a049;
    }

    #registerScreen{
        display: none;
    }

    #message{
        margin-top: 10px;
        color: yellow;
    }

    /* ゲーム画面 */
    #gameScreen{
        display: none;
        text-align: center;
        padding-top: 100px;
    }

    canvas{
        background: black;
        border: 3px solid white;
    }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginContainer">

    <!-- ログイン -->
    <div class="box" id="loginScreen">
        <h2>ログイン</h2>

        <input type="text" id="loginUsername" placeholder="ユーザーネーム">
        <input type="password" id="loginPassword" placeholder="パスワード">

        <br>
        <button onclick="login()">ログイン</button>
        <button onclick="showRegister()">新規会員登録</button>

        <div id="message"></div>
    </div>

    <!-- 会員登録 -->
    <div class="box" id="registerScreen">
        <h2>新規会員登録</h2>

        <input type="text" id="registerUsername" placeholder="ユーザーネーム">
        <input type="password" id="registerPassword" placeholder="パスワード">

        <br>
        <button onclick="register()">登録</button>
    </div>

</div>

<!-- 既存のゲーム -->
<div id="gameScreen">
    <h1>ゲームスタート！</h1>

    <canvas id="gameCanvas" width="500" height="300"></canvas>
</div>

<script>
    // 保存用
    let savedUsername = "";
    let savedPassword = "";

    // 会員登録画面表示
    function showRegister(){
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("registerScreen").style.display = "block";
    }

    // 登録
    function register(){
        savedUsername = document.getElementById("registerUsername").value;
        savedPassword = document.getElementById("registerPassword").value;

        alert("登録完了！");

        document.getElementById("registerScreen").style.display = "none";
        document.getElementById("loginScreen").style.display = "block";
    }

    // ログイン
    function login(){
        const username = document.getElementById("loginUsername").value;
        const password = document.getElementById("loginPassword").value;

        if(username === savedUsername && password === savedPassword){

            // ログイン画面を消す
            document.getElementById("loginContainer").style.display = "none";

            // ゲーム表示
            document.getElementById("gameScreen").style.display = "block";

            startGame();

        } else {
            document.getElementById("message").innerText =
                "ユーザー名またはパスワードが違います。";
        }
    }

    // ===== 既存ゲーム =====
    function startGame(){

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let x = 50;
        let y = 150;
        let dx = 3;

        function gameLoop(){

            ctx.clearRect(0,0,canvas.width,canvas.height);

            // プレイヤー
            ctx.fillStyle = "lime";
            ctx.fillRect(x,y,50,50);

            x += dx;

            // 壁反射
            if(x + 50 > canvas.width || x < 0){
                dx = -dx;
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    }
</script>

</body>
</html>
